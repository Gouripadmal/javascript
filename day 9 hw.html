<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="inp" placeholder="enter the comment" />
<button onclick="show()">Submit</button>
<p id="result"> </p>
    <script language = "javascript" type="text/javascript">
        function show (){
let regex = /"bad","ugly","stupid"/;
let mail = document.getElementById("inp").value;
if (regex.test(mail)) {
    document.getElementById("inp").textContent = "Valid Comment";
    
} else {
    document.getElementById("result").textContent = "InValid Comment";
    
}
        }
    </script>
</body>
</html>
