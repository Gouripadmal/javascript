<!DOCTYPE html>
<html>
<body>

<script>
let arr = [2, 0, 5, 0, 8, 1];
let j = 0;

for (let i = 0; i < arr.length; i++) {
    if (arr[i] != 0) {
        let temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
        j++;
    }
}

console.log(arr);
document.write(arr);
</script>

</body>
</html>
