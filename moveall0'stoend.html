<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <script language="java script" type="text/javascript">
        let arr = [2, 0, 5, 0, 8, 1];
let n = 0;

// Move all non-zero elements to the front
for (let i = 0; i < arr.length; i++) {
    if (arr[i] != 0) {
        let numm = arr[i];
        arr[i] = arr[n];
        arr[n] = numm;
        n++;
    }
}

console.log(arr);
    </script>
    
</body>
</html>
