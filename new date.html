
<!DOCTYPE html>
<html>
<body>

<h2>JavaScript new Date()</h2>

<p>Using new Date(), creates a new date object with the current date and time:</p>

<p id="demo"></p>

<script>
    let date = new Date(86400000);
console.log(date);
var dat = new Date();
document.getElementById("demo").innerHTML = dat;
</script>

</body>
</html>
