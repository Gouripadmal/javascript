<body>
    <script language="javascript" type="text/javascript">
 let arr = [2, 5, 8, 1];

let start = 0;
let end = arr.length - 1;

while (start < end) {
    let temp = arr[start];
    arr[start] = arr[end];
    arr[end] = temp;

    start++;
    end--;
}

console.log(arr);


    </script>
</body>
