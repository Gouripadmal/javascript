<!DOCTYPE html>
<html>
<body>

<script>
let arr = [2, 5, 8, 1];

let largest = arr[0];
let secondLargest = arr[0];

for (let i = 1; i < arr.length; i++) {

    if (arr[i] > largest) {
        secondLargest = largest;
        largest = arr[i];
    }
    else if (arr[i] > secondLargest && arr[i] != largest) {
        secondLargest = arr[i];
    }
}

document.write("Second Largest = " + secondLargest);
</script>

</body>
</html>
